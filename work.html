<!doctype html>
<!-- My centering div project (almost) -->
<head>

    <title>Working on HTML</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        /*Empty page init*/
        body{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /*Containering*/
        .divA{
            position: relative;
            width: 100%;
            height: 100px;
            margin-top: 100px;
        }
        /*Finally, centering*/
        .pA{
            align-items: center;
            justify-content: center;
            margin: auto;
            width: max-content;
        }
    </style>

</head>

<body>

    <div class="divA">
        <p class="pA">
            This is my centered div, achieved myself :D
        </p>
    </div>

</body>
